name: CI/CD

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  # ============================================
  # 1. Lint & Validate
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Lint server.js
        working-directory: server
        run: |
          npx eslint server.js || echo "No ESLint config, skipping"
          node -c server.js && echo "✓ server.js syntax OK"

      - name: Validate HTML
        working-directory: server
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('public/index.html', 'utf8');
            if (!html.includes('</html>')) throw new Error('Invalid HTML');
            if (!html.includes('<script>')) throw new Error('No script tag');
            console.log('✓ index.html valid');
          "

  # ============================================
  # 2. Firmware compile test
  # ============================================
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/bin sh
          export PATH=$PATH:$HOME/bin
          arduino-cli version

      - name: Install AVR core
        run: |
          export PATH=$PATH:$HOME/bin
          arduino-cli core install arduino:avr --additional-urls "" 2>&1 || true
          arduino-cli core list

      - name: Compile Uno firmware
        run: |
          export PATH=$PATH:$HOME/bin
          arduino-cli compile --fqbn arduino:avr:uno firmware/servo_head/ 2>&1
          echo "✓ servo_head compiled"

      - name: Compile Mega firmware
        run: |
          export PATH=$PATH:$HOME/bin
          arduino-cli compile --fqbn arduino:avr:mega firmware/servo_body/ 2>&1
          echo "✓ servo_body compiled"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hex
          path: |
            firmware/servo_head/**/*.hex
            firmware/servo_body/**/*.hex

  # ============================================
  # 3. Integration test (mock serial)
  # ============================================
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run server smoke test
        working-directory: server
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 2
          # Test HTTP endpoint
          curl -s http://localhost:3000/api/status | head -1
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ | grep -q 200 && echo "✓ Web UI serves OK"
          kill $SERVER_PID 2>/dev/null || true

  # ============================================
  # 4. Build release on master
  # ============================================
  release:
    runs-on: ubuntu-latest
    needs: [lint, firmware, test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/bin sh
          export PATH=$PATH:$HOME/bin

      - name: Build firmware HEX
        run: |
          export PATH=$PATH:$HOME/bin
          mkdir -p release/firmware/servo_head release/firmware/servo_body release/app release/docs
          arduino-cli compile --fqbn arduino:avr:uno firmware/servo_head/ --output-dir release/firmware/servo_head/
          arduino-cli compile --fqbn arduino:avr:mega firmware/servo_body/ --output-dir release/firmware/servo_body/
          cp server/public/index.html release/app/
          cp server/server.js release/app/
          cp server/package.json release/app/
          cp README.md release/docs/
          echo "✓ Release artifacts built"

      - name: Package release
        run: |
          cd release
          tar czf ../robot-catty-${{ github.run_number }}.tar.gz .
          echo "Packaged"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: robot-catty-${{ github.run_number }}.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Robot Catty v${{ github.run_number }}
            
            ### Включает
            - `servo_head.hex` — Uno (3 серво + RGB)
            - `servo_body.hex` — Mega (4 серво)
            - `app/` — Web UI + Node.js сервер
            - Скрипты прошивки для Linux/Windows
            
            ### Быстрый старт
            ```bash
            tar xzf robot-catty-*.tar.gz
            cd release
            bash scripts/linux/flash_all.sh
            cd app && npm install && node server.js
            ```
          files: robot-catty-${{ github.run_number }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # 5. Deploy to Pi (master only)
  # ============================================
  deploy:
    needs: release
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: [self-hosted, linux, pi]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Raspberry Pi
        run: |
          cd /home/ruslan/robot-catty
          git pull origin master
          cd server
          npm install --production
          pm2 restart robot-catty || pm2 start server.js --name robot-catty
          echo "✓ Deployed to Pi"

      - name: Health check
        run: |
          sleep 3
          curl -s http://localhost:3000/api/status | head -1
          echo "✓ Health check passed"
